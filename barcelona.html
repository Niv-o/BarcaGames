<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC Barcelona — Fixtures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #004D98;
    --blue-l: #0062c3;
    --red:    #A50044;
    --red-l:  #c8005a;
    --gold:   #EDBB00;
    --gold-d: #c49a00;
    --bg:     #07091a;
    --bg2:    #0b0e22;
    --surf:   #0d1228;
    --surf2:  #121733;
    --surf3:  #181e3e;
    --border: #1c2340;
    --border2:#252d52;
    --text:   #e4e8f5;
    --text2:  #8891b8;
    --text3:  #545e88;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1000;
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }

  .header-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 120% at 20% 50%, rgba(0,77,152,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 80% 120% at 80% 50%, rgba(165,0,68,0.55) 0%, transparent 60%),
      linear-gradient(180deg, #0a0e22 0%, #07091a 100%);
  }

  .header-stripe {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--gold), var(--red));
  }

  /* Blaugrana diagonal bars behind the header */
  .header-bars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    opacity: 0.06;
  }
  .header-bars span {
    position: absolute;
    top: -50%;
    width: 60px;
    height: 300%;
    background: var(--blue);
    transform: rotate(-20deg);
  }
  .header-bars span:nth-child(1) { left: 10%; background: var(--blue); }
  .header-bars span:nth-child(2) { left: 20%; background: var(--red); }
  .header-bars span:nth-child(3) { left: 30%; background: var(--blue); }
  .header-bars span:nth-child(4) { left: 65%; background: var(--red); }
  .header-bars span:nth-child(5) { left: 75%; background: var(--blue); }
  .header-bars span:nth-child(6) { left: 85%; background: var(--red); }

  .header-content { position: relative; z-index: 2; }

  .crest-wrap {
    display: inline-block;
    position: relative;
    margin-bottom: 1.25rem;
  }
  .crest-wrap::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(237,187,0,0.15) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  .header-crest {
    width: 90px;
    height: 90px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6)) drop-shadow(0 0 40px rgba(237,187,0,0.2));
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: 0.08em;
    line-height: 1;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 0.4rem;
    opacity: 0.9;
  }

  /* ── CONTAINER ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
  }

  /* ── API KEY PANEL ── */
  .api-panel {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }
  .api-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(237,187,0,0.4), transparent);
  }

  .api-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
  }

  .api-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    padding: 0.55rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    min-width: 180px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .api-input:focus {
    border-color: var(--blue-l);
    box-shadow: 0 0 0 3px rgba(0,77,152,0.2);
  }
  .api-input::placeholder { color: var(--text3); }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 0.55rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.84rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--blue);
    color: #fff;
  }
  .btn-primary:hover { background: var(--blue-l); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: var(--surf2);
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surf3); color: var(--text); }

  /* ── SECTION CONTROLS ── */
  .section-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .section-label .accent-bar {
    width: 4px;
    height: 22px;
    background: linear-gradient(180deg, var(--gold), var(--red));
    border-radius: 2px;
    display: block;
  }

  .controls-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── TOGGLE ── */
  .toggle-group {
    display: flex;
    background: var(--surf2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    overflow: hidden;
  }
  .toggle-btn {
    padding: 0.42rem 1rem;
    font-size: 0.84rem;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'DM Sans', sans-serif;
  }
  .toggle-btn:not(:last-child) { border-right: 1px solid var(--border2); }
  .toggle-btn.active {
    background: var(--blue);
    color: #fff;
  }
  .toggle-btn:hover:not(.active) { color: var(--text); background: var(--surf3); }

  /* ── FIXTURE CARDS ── */
  .fixtures-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-bottom: 3.5rem;
  }

  .fixture-card {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.4rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: center;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  }
  .fixture-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .fixture-card.home::before { background: var(--blue); }
  .fixture-card.away::before { background: var(--red); }

  .fixture-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  .fixture-card.home:hover { border-color: rgba(0,77,152,0.5); }
  .fixture-card.away:hover { border-color: rgba(165,0,68,0.5); }

  /* shimmer on hover */
  .fixture-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.025) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .fixture-card:hover::after { transform: translateX(100%); }

  .team-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
  }
  .team-side.right { align-items: center; }

  .team-logo-wrap {
    width: 58px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .team-logo {
    width: 54px;
    height: 54px;
    object-fit: contain;
    transition: transform 0.2s;
  }
  .fixture-card:hover .team-logo { transform: scale(1.06); }

  .team-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text2);
    text-align: center;
    line-height: 1.25;
    max-width: 100px;
  }
  .team-name.barca { color: var(--text); }

  /* Center meta */
  .match-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    text-align: center;
    padding: 0 0.5rem;
    min-width: 140px;
  }

  .competition-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--surf3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 0.22rem 0.7rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.64rem;
    letter-spacing: 0.06em;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
    max-width: 160px;
    overflow: hidden;
  }
  .competition-pill img {
    width: 14px;
    height: 14px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .competition-pill span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .match-vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: var(--border2);
    line-height: 1;
  }

  .match-date {
    font-size: 0.78rem;
    color: var(--text2);
    font-weight: 500;
  }

  .match-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 0.06em;
    color: var(--gold);
    line-height: 1;
  }

  .home-away-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.18rem 0.6rem;
    border-radius: 4px;
    display: inline-block;
  }
  .home-away-badge.home {
    background: rgba(0,77,152,0.2);
    color: #6ba3ff;
    border: 1px solid rgba(0,77,152,0.4);
  }
  .home-away-badge.away {
    background: rgba(165,0,68,0.2);
    color: #ff7ab5;
    border: 1px solid rgba(165,0,68,0.4);
  }

  /* ── STATE BOXES ── */
  .state-box {
    text-align: center;
    padding: 3.5rem 1rem;
    color: var(--text3);
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(165,0,68,0.08);
    border: 1px solid rgba(165,0,68,0.3);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    color: #ff7ab5;
    font-size: 0.87rem;
  }

  /* ── LA LIGA TABLE ── */
  .table-section { margin-bottom: 2rem; }

  .table-card {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .table-header-bar {
    background: linear-gradient(90deg, rgba(0,77,152,0.8) 0%, rgba(165,0,68,0.8) 100%);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .table-header-bar img { width: 26px; height: 26px; object-fit: contain; }
  .table-header-bar h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    color: #fff;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
  }
  thead th {
    background: var(--surf2);
    padding: 0.6rem 0.75rem;
    text-align: center;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
  }
  thead th:nth-child(1) { text-align: center; width: 40px; }
  thead th:nth-child(2) { text-align: left; padding-left: 1rem; }

  tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surf2); }

  tbody tr.barca-row {
    background: rgba(0,77,152,0.1);
  }
  tbody tr.barca-row td { color: var(--text); }

  tbody td {
    padding: 0.65rem 0.75rem;
    text-align: center;
    color: var(--text2);
    white-space: nowrap;
  }
  tbody td:nth-child(1) {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    width: 40px;
  }
  tbody td:nth-child(2) { text-align: left; padding-left: 1rem; }

  .team-cell {
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }
  .team-cell img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
  .team-cell span { font-weight: 500; }

  .pts-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    color: var(--gold) !important;
  }

  .pos-ucl  { color: #5b9cf6 !important; }
  .pos-el   { color: #f5a623 !important; }
  .pos-conf { color: #22c55e !important; }
  .pos-rel  { color: #ef4444 !important; }

  .zone-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 2px;
    flex-shrink: 0;
  }

  .table-legend {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 0.8rem 1.25rem;
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 2rem 1rem;
    border-top: 1px solid var(--border);
    color: var(--text3);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    line-height: 1.8;
  }
  .footer a { color: var(--text3); text-decoration: underline; }

  #last-updated {
    color: var(--text3);
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    margin-top: 0.25rem;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 560px) {
    .fixture-card {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .match-center {
      grid-column: 1 / -1;
      order: -1;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      min-width: unset;
    }
    .team-side { min-width: unset; }
    .team-logo { width: 44px; height: 44px; }
  }

  /* ── ENTRANCE ANIMATION ── */
  .fixture-card {
    animation: slideUp 0.3s ease both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger */
  .fixture-card:nth-child(1)  { animation-delay: 0.00s; }
  .fixture-card:nth-child(2)  { animation-delay: 0.05s; }
  .fixture-card:nth-child(3)  { animation-delay: 0.10s; }
  .fixture-card:nth-child(4)  { animation-delay: 0.15s; }
  .fixture-card:nth-child(5)  { animation-delay: 0.20s; }
  .fixture-card:nth-child(6)  { animation-delay: 0.25s; }
  .fixture-card:nth-child(7)  { animation-delay: 0.30s; }
  .fixture-card:nth-child(8)  { animation-delay: 0.35s; }
  .fixture-card:nth-child(9)  { animation-delay: 0.40s; }
  .fixture-card:nth-child(10) { animation-delay: 0.45s; }
  .fixture-card:nth-child(11) { animation-delay: 0.50s; }
  .fixture-card:nth-child(12) { animation-delay: 0.55s; }
  .fixture-card:nth-child(13) { animation-delay: 0.60s; }
  .fixture-card:nth-child(14) { animation-delay: 0.65s; }
  .fixture-card:nth-child(15) { animation-delay: 0.70s; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-bg"></div>
  <div class="header-bars">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>
  <div class="header-stripe"></div>
  <div class="header-content">
    <div class="crest-wrap">
      <img class="header-crest"
        src="https://crests.football-data.org/81.svg"
        alt="FC Barcelona"
        onerror="this.style.opacity='0'">
    </div>
    <h1>FC Barcelona</h1>
    <div class="header-sub">Upcoming Fixtures &amp; La Liga Table</div>
  </div>
</header>

<div class="container">

  <!-- API KEY -->
  <div class="api-panel">
    <span class="api-label">API Key</span>
    <input class="api-input" type="password" id="apiKey"
      placeholder="Paste your football-data.org key here…" autocomplete="off">
    <button class="btn btn-primary" onclick="loadAll()">Load Data</button>
    <button class="btn btn-ghost" onclick="refreshAll()" id="refreshBtn" style="display:none">↻ Refresh</button>
  </div>

  <!-- FIXTURES -->
  <div class="section-bar">
    <div class="section-label">
      <span class="accent-bar"></span>
      Upcoming Matches
    </div>
    <div class="controls-row">
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="setLimit(5,this)">5</button>
        <button class="toggle-btn"        onclick="setLimit(10,this)">10</button>
        <button class="toggle-btn"        onclick="setLimit(15,this)">15</button>
      </div>
    </div>
  </div>

  <div id="fixtures-container" class="fixtures-list">
    <div class="state-box">
      <div style="font-size:2.5rem;margin-bottom:0.75rem;opacity:0.4">⚽</div>
      <div>Enter your API key above and click <strong>Load Data</strong></div>
      <div style="margin-top:0.5rem;font-size:0.78rem">
        Get a free key at <a href="https://www.football-data.org/" target="_blank" rel="noopener" style="color:var(--gold)">football-data.org</a>
      </div>
    </div>
  </div>

  <!-- LA LIGA TABLE -->
  <div class="table-section">
    <div class="section-bar" style="margin-bottom:1.25rem">
      <div class="section-label">
        <span class="accent-bar"></span>
        La Liga Table
      </div>
    </div>
    <div id="table-container">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="footer">
    Data from <a href="https://www.football-data.org/" target="_blank" rel="noopener">football-data.org</a>
    &nbsp;·&nbsp; Times shown in Israel Time (Asia/Jerusalem)<br>
    <div id="last-updated"></div>
  </div>

</div><!-- /container -->

<script>
  const API  = 'https://api.football-data.org/v4';
  const BARCA = 81;
  const FALLBACK_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'%3E%3Ctext y='1em' font-size='38'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E";

  let allMatches = [];
  let limit = 5;
  let refreshTimer = null;

  /* ── INIT ── */
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('barca_api_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      loadAll();
    }
  });

  /* ── LIMIT TOGGLE ── */
  function setLimit(n, btn) {
    limit = n;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFixtures();
  }

  /* ── LOAD ALL ── */
  async function loadAll() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { alert('Please enter your API key first.'); return; }
    localStorage.setItem('barca_api_key', key);
    document.getElementById('refreshBtn').style.display = 'inline-flex';

    clearInterval(refreshTimer);
    refreshTimer = setInterval(refreshAll, 5 * 60 * 1000);

    await Promise.all([fetchFixtures(key), fetchStandings(key)]);
    document.getElementById('last-updated').textContent =
      'Updated: ' + new Date().toLocaleString('en-GB', { timeZone: 'Asia/Jerusalem', hour12: false });
  }

  function refreshAll() {
    const key = localStorage.getItem('barca_api_key');
    if (key) loadAll();
  }

  /* ── API HELPER ── */
  async function api(path, key) {
    let r;
    try {
      const targetUrl = `${API}${path}`;
      const proxyUrl  = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;
      r = await fetch(proxyUrl, { headers: { 'X-Auth-Token': key } });
    } catch (networkErr) {
      throw new Error(
        'Network error — could not reach football-data.org. ' +
        'Possible causes: (1) Key not yet activated — check your email for a confirmation link from football-data.org. ' +
        '(2) CORS blocked — try opening the page locally instead of GitHub Pages while testing. ' +
        `(3) No internet. Raw: ${networkErr.message}`
      );
    }
    if (!r.ok) {
      let body = '';
      try { const j = await r.json(); body = j.message || ''; } catch (_) {}
      const msg = r.status === 400 ? `Bad request${body ? ': ' + body : ''}` :
                  r.status === 401 ? 'Unauthorized — key is incorrect or not yet activated.' :
                  r.status === 403 ? `Forbidden — your free tier may not cover this endpoint.${body ? ' ' + body : ''}` :
                  r.status === 429 ? 'Rate limit hit — please wait a moment then refresh.' :
                  `API error ${r.status}${body ? ': ' + body : ''}`;
      throw new Error(msg);
    }
    return r.json();
  }

  /* ── FIXTURES ── */
  async function fetchFixtures(key) {
    const el = document.getElementById('fixtures-container');
    el.innerHTML = '<div class="state-box"><div class="spinner"></div>Loading fixtures…</div>';
    try {
      const data = await api(`/teams/${BARCA}/matches?status=SCHEDULED&limit=50`, key);
      allMatches = (data.matches || []).sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
      renderFixtures();
    } catch (e) {
      el.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
    }
  }

  function renderFixtures() {
    const el = document.getElementById('fixtures-container');
    const shown = allMatches.slice(0, limit);
    if (!shown.length) {
      el.innerHTML = '<div class="state-box">No upcoming fixtures found.</div>';
      return;
    }
    el.innerHTML = shown.map(fixtureCard).join('');
  }

  function fixtureCard(m) {
    const isHome  = m.homeTeam.id === BARCA;
    const home    = m.homeTeam;
    const away    = m.awayTeam;
    const barca   = isHome ? home : away;
    const opp     = isHome ? away : home;

    const dt      = new Date(m.utcDate);
    const dateStr = dt.toLocaleDateString('en-GB', {
      timeZone: 'Asia/Jerusalem', weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
    });
    const timeStr = dt.toLocaleTimeString('en-GB', {
      timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', hour12: false
    });

    const compEmb  = m.competition.emblem ? `<img src="${m.competition.emblem}" alt="" onerror="this.style.display='none'">` : '';
    const compName = m.competition.name;

    const leftTeam  = home;   /* home always left */
    const rightTeam = away;   /* away always right */
    const leftBarca  = isHome;
    const rightBarca = !isHome;

    return `
    <div class="fixture-card ${isHome ? 'home' : 'away'}">
      <div class="team-side left">
        <div class="team-logo-wrap">
          <img class="team-logo"
            src="${leftTeam.crest || FALLBACK_IMG}"
            alt="${leftTeam.name}"
            onerror="this.src='${FALLBACK_IMG}'">
        </div>
        <div class="team-name ${leftBarca ? 'barca' : ''}">${leftTeam.shortName || leftTeam.name}</div>
      </div>

      <div class="match-center">
        <div class="competition-pill">${compEmb}<span>${compName}</span></div>
        <div class="match-vs">VS</div>
        <div class="match-date">${dateStr}</div>
        <div class="match-time">${timeStr} <span style="font-size:0.9rem;color:var(--text3)">IST</span></div>
        <div class="home-away-badge ${isHome ? 'home' : 'away'}">${isHome ? 'Home' : 'Away'}</div>
      </div>

      <div class="team-side right">
        <div class="team-logo-wrap">
          <img class="team-logo"
            src="${rightTeam.crest || FALLBACK_IMG}"
            alt="${rightTeam.name}"
            onerror="this.src='${FALLBACK_IMG}'">
        </div>
        <div class="team-name ${rightBarca ? 'barca' : ''}">${rightTeam.shortName || rightTeam.name}</div>
      </div>
    </div>`;
  }

  /* ── STANDINGS ── */
  async function fetchStandings(key) {
    const el = document.getElementById('table-container');
    el.innerHTML = '<div class="state-box"><div class="spinner"></div>Loading table…</div>';
    try {
      const data  = await api('/competitions/PD/standings', key);
      const table = data.standings.find(s => s.type === 'TOTAL')?.table || data.standings[0].table;
      renderStandings(table, data.competition);
    } catch (e) {
      el.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
    }
  }

  function renderStandings(table, comp) {
    const rows = table.map(entry => {
      const pos   = entry.position;
      const isBarca = entry.team.id === BARCA;

      let posClass = '', dotColor = '';
      if      (pos <= 4)  { posClass = 'pos-ucl';  dotColor = '#5b9cf6'; }
      else if (pos <= 6)  { posClass = 'pos-el';   dotColor = '#f5a623'; }
      else if (pos >= 18) { posClass = 'pos-rel';  dotColor = '#ef4444'; }

      const gd = entry.goalDifference;
      const gdStr = gd > 0 ? `+${gd}` : `${gd}`;

      return `
      <tr class="${isBarca ? 'barca-row' : ''}">
        <td><span class="${posClass}">${pos}</span></td>
        <td>
          <div class="team-cell">
            ${dotColor ? `<span class="zone-dot" style="background:${dotColor}"></span>` : '<span style="width:10px;display:inline-block"></span>'}
            <img src="${entry.team.crest}" alt="" onerror="this.style.display='none'">
            <span>${entry.team.shortName || entry.team.name}</span>
          </div>
        </td>
        <td>${entry.playedGames}</td>
        <td>${entry.won}</td>
        <td>${entry.draw}</td>
        <td>${entry.lost}</td>
        <td>${entry.goalsFor}</td>
        <td>${entry.goalsAgainst}</td>
        <td style="color:${gd>0?'#6ba3ff':gd<0?'#ff7ab5':'var(--text2)'}">${gdStr}</td>
        <td class="pts-cell">${entry.points}</td>
      </tr>`;
    }).join('');

    const compEmb = comp?.emblem
      ? `<img src="${comp.emblem}" alt="La Liga" onerror="this.style.display='none'">`
      : '';

    document.getElementById('table-container').innerHTML = `
    <div class="table-card">
      <div class="table-header-bar">
        ${compEmb}
        <h2>La Liga &mdash; ${comp?.currentSeason?.startDate?.slice(0,4) || ''} / ${comp?.currentSeason?.endDate?.slice(2,4) || ''}</h2>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Club</th><th>P</th><th>W</th><th>D</th>
              <th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="table-legend">
        <div class="legend-item"><span class="zone-dot" style="background:#5b9cf6"></span> Champions League</div>
        <div class="legend-item"><span class="zone-dot" style="background:#f5a623"></span> Europa League</div>
        <div class="legend-item"><span class="zone-dot" style="background:#ef4444"></span> Relegation</div>
      </div>
    </div>`;
  }
</script>
</body>
</html>
