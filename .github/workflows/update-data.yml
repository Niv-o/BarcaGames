name: Update Barcelona Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch fixtures and standings
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -sf -H "X-Auth-Token: $API_KEY" \
            "https://api.football-data.org/v4/teams/81/matches?status=SCHEDULED&limit=50" \
            -o /tmp/matches.json

          curl -sf -H "X-Auth-Token: $API_KEY" \
            "https://api.football-data.org/v4/competitions/PD/standings" \
            -o /tmp/standings.json

          python3 - <<'EOF'
import json
from datetime import datetime, timezone

with open('/tmp/matches.json') as f:
    matches_raw = json.load(f)

with open('/tmp/standings.json') as f:
    standings_raw = json.load(f)

data = {
    "updated": datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
    "matches": matches_raw.get("matches", []),
    "standings": standings_raw.get("standings", []),
    "competition": standings_raw.get("competition", {})
}

with open("data.json", "w", encoding="utf-8") as f:
    json.dump(data, f, ensure_ascii=False)

print(f"data.json written: {len(data['matches'])} matches, {len(data['standings'])} standing groups")
EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update Barcelona data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
